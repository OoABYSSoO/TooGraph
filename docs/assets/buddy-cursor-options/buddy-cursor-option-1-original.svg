<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="-80 -80 160 160" role="img" aria-labelledby="title desc">
  <title id="title">Buddy cursor option 1 - original four point</title>
  <desc id="desc">A four-point gold virtual cursor based on Buddy cursor option B, shaped like an isosceles triangle with its base midpoint pulled down.</desc>
  <defs>
    <linearGradient id="cursorGold1" x1="-42" y1="-72" x2="42" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f6d36f"/>
      <stop offset="44%" stop-color="#e2b65f"/>
      <stop offset="100%" stop-color="#bd7f2a"/>
    </linearGradient>
  </defs>
  <path
    fill="url(#cursorGold1)"
    stroke="#171818"
    stroke-width="7"
    stroke-linejoin="round"
    stroke-linecap="round"
    d="M0-74
       C11-36 28 5 48 36
       C25 34 10 47 0 66
       C-10 47 -25 34 -48 36
       C-28 5 -11-36 0-74Z"
  />

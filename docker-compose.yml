services:
  toograph:
    build:
      context: .
      dockerfile: Dockerfile
    image: toograph:local
    ports:
      - "3477:3477"
    environment:
      NODE_ENV: production
      PORT: "3477"
      TOOGRAPH_HOST: 0.0.0.0
      TOOGRAPH_SKIP_DEP_INSTALL: "1"
    volumes:
      - toograph-data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  toograph-data:
